<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style> /* Same CSS as register.html */
        body { font-family: -apple-system, sans-serif; background: #f9fafb; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; padding: 32px; border-radius: 8px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #111827; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: #374151; }
        .alert { background: #def7ec; color: #03543f; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;}
        .error { background: #fde8e8; color: #9b1c1c; }
        a { display: block; text-align: center; margin-top: 15px; color: #2563eb; text-decoration: none; font-size: 0.9rem;}
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">Welcome Back</h2>
        
        <div th:if="${param.registered}" class="alert">Registration successful! Please login.</div>
        <div th:if="${param.error}" class="alert error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <label>Username</label>
            <input type="text" name="username" required/>
            <label>Password</label>
            <input type="password" name="password" required/>
            <button type="submit" class="btn">Login</button>
        </form>
        <a href="/register">Don't have an account? Register</a>
    </div>
</body>
</html>
