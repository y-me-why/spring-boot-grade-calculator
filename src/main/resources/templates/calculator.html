<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Grade Calculator</title>
    <style>
        /* Minimalist, Professional CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .subject-container {
            background: #fdfdfd;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            font-weight: 500;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-align: center;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-bottom: 24px;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .btn-primary {
            background: #111827;
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #374151;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enter Student Marks</h2>
        
        <form action="#" th:action="@{/calculator}" th:object="${gradeRecord}" method="post">
            
            <label>Student Name</label>
            <input type="text" th:field="*{studentName}" placeholder="e.g. Mathew" required />

            <label>Maximum Marks (Per Subject)</label>
            <input type="number" step="0.01" th:field="*{outOf}" placeholder="e.g. 50" required />

            <div class="subject-container" th:each="subject, itemStat : *{subjects}">
                <label>Subject Name</label>
                <input type="text" th:field="*{subjects[__${itemStat.index}__].subjectName}" placeholder="e.g. Physics" required />
                
                <label>Score</label>
                <input type="number" step="0.01" th:field="*{subjects[__${itemStat.index}__].score}" style="margin-bottom: 0;" required />
            </div>

            <button type="submit" name="addRow" class="btn btn-secondary">+ Add Another Subject</button>
            <button type="submit" name="calculate" class="btn btn-primary">Calculate Final Grade</button>

        </form>
    </div>

</body>
</html>
